services:
  - type: web
    name: window-film-inventory-api
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: BACKEND_MODE
        value: proxy
      - key: CACHE_TTL_MS
        value: 30000
      - key: MAX_CACHE_ENTRIES
        value: 500
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: APPS_SCRIPT_URL
        sync: false
